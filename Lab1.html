<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do List (Lab1)</title>
    <style>
        body { 
            font-family: Arial, sans-serif; 
            background-color: #f9f9f9; 
            margin: 0; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh;
        }
        
        .container { 
            width: 100%;
            max-width: 400px; 
            background: white; 
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
        }
        
        input[type="text"] { width: 65%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; }
        button { cursor: pointer; }
        ul { list-style-type: none; padding: 0; }
        li { background: #eee; margin: 10px 0; padding: 10px; display: flex; justify-content: space-between; align-items: center; border-radius: 4px; }
        .stats { margin-top: 20px; font-weight: bold; text-align: center; }

        /* ==========================================
           UI/UX ПОМИЛКА 1: Контрастність кнопки
           ========================================== */

         .add-btn { padding: 10px 15px; background-color: #007BFF; color: white; border: none; }
        
        /* .add-btn { padding: 10px 15px; background-color: #ffffff; color: #f0f0f0; border: 1px solid #ccc; } */


        /* ==========================================
           UI/UX ПОМИЛКА 2: Розмір кнопки видалення
           ========================================== */

         .delete-btn { width: 30px; height: 30px; font-size: 16px; background-color: #dc3545; color: white; border: none; border-radius: 4px; }
        
        /* .delete-btn { width: 12px; height: 12px; font-size: 6px; padding: 0; background-color: red; color: white; border: none; } */

    </style>
</head>
<body>

<div class="container">
    <h2>Список завдань</h2>
    <div>
        <input type="text" id="taskInput" placeholder="Що потрібно зробити?">
        <button class="add-btn" onclick="addTask()">Додати</button>
    </div>
    
    <ul id="taskList"></ul>

    <div class="stats">Загальна кількість завдань: <span id="taskCount">0</span></div>
</div>

<script>
    function addTask() {
        const input = document.getElementById('taskInput');
        const ul = document.getElementById('taskList');
        const taskText = input.value;

        // ==========================================
        // ФУНКЦІОНАЛЬНА ПОМИЛКА 1: Відсутність валідації
        // ==========================================
    
        if (taskText.trim() === '') {
            alert("Завдання не може бути порожнім!");
            return;
        }
        
        const li = document.createElement('li');
        li.innerHTML = `${taskText} <button class="delete-btn" onclick="deleteTask(this)">X</button>`;
        ul.appendChild(li);

        document.getElementById('taskCount').innerText = parseInt(document.getElementById('taskCount').innerText) + 1;
        input.value = ''; 
    }

    function deleteTask(btnElement) {
        const ul = document.getElementById('taskList');

        // ==========================================
        // ФУНКЦІОНАЛЬНА ПОМИЛКА 2: Неправильне видалення
        // ==========================================
    
        const liToRemove = btnElement.parentElement;
        liToRemove.remove();
        
        /*
        if(ul.lastElementChild) {
            ul.removeChild(ul.lastElementChild);
        }
        */

        // ==========================================
        // ФУНКЦІОНАЛЬНА ПОМИЛКА 3: Зламаний лічильник
        // ==========================================
        
        
        let counter = document.getElementById('taskCount');
        counter.innerText = parseInt(counter.innerText) - 1;
        
    }
</script>

</body>
</html>
